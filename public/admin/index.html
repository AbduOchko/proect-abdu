<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Админ-панель — Маркет</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
  <div id="admin-app">

      <div class="a-top-title"><i class="bi bi-shield-lock"></i> Админ-панель</div>
      <div class="a-top-sub" id="a-whoami"></div>
    </header>

    <nav id="a-nav">
      <button class="a-nav-btn active" data-sec="stats"><i class="bi bi-bar-chart"></i> Статистика</button>
      <button class="a-nav-btn" data-sec="users"><i class="bi bi-people"></i> Юзеры</button>

      <button class="a-nav-btn" data-sec="requests"><i class="bi bi-inbox"></i> Заявки</button>
      <button class="a-nav-btn" data-sec="deals"><i class="bi bi-briefcase"></i> Сделки</button>

    <main id="a-view"><div class="loader"><span class="spin"></span></div></main>
  </div>
  <div id="toast" hidden></div>
