<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Маркет цифровых товаров</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div id="topbar-title">Каталог</div>
      <div id="topbar-action"></div>
    </header>

    <main id="view"></main>

    <nav id="tabbar">
      <button class="tab" data-tab="catalog" data-icon="shop">
        <i class="bi bi-shop tab-ic"></i><span class="tab-lb">Каталог</span>
      </button>
      <button class="tab" data-tab="exchange" data-icon="bar-chart">
        <i class="bi bi-bar-chart tab-ic"></i><span class="tab-lb">Биржа</span>
      </button>
      <button class="tab" data-tab="chats" data-icon="chat-dots">
        <i class="bi bi-chat-dots tab-ic"></i><span class="tab-lb">Чаты</span>
        <span class="tab-badge" id="chats-badge" hidden>0</span>
      </button>
      <button class="tab" data-tab="deals" data-icon="briefcase">
        <i class="bi bi-briefcase tab-ic"></i><span class="tab-lb">Сделки</span>
      </button>
      <button class="tab" data-tab="profile" data-icon="person">
        <i class="bi bi-person tab-ic"></i><span class="tab-lb">Профиль</span>
      </button>
    </nav>
  </div>

  <div id="sheet-overlay" hidden>
    <div id="sheet">
      <div id="sheet-handle"></div>
      <div id="sheet-body"></div>
    </div>
  </div>

  <div id="toast" hidden></div>

  <script src="/js/app.js"></script>
</body>
</html>
